[alembic]
# Script location relative to this ini file
script_location = %(here)s/migrations

# Where new migration files are written
prepend_sys_path = ../../..
path_separator = os
version_path_separator = os

# Timestamped migration files: 20260501_2143_<rev>_<slug>.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# DB URL is read from env in env.py — keep this empty
sqlalchemy.url =

[post_write_hooks]
# Auto-format generated migrations with ruff (project standard)
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
